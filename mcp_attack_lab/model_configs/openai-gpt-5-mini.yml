id: openai-gpt-5-mini
provider: openai
model: gpt-5-mini
api_key_env: OPENAI_API_KEY

purpose: >
  Stronger but still cost-conscious GPT baseline for hosted scenario execution.

defaults:
  temperature: 0.1
  top_p: 1.0
  max_tokens: 256

notes: >
  Useful when nano is too weak and you want a more realistic hosted benchmark.

